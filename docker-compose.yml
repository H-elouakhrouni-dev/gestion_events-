version: '3.8'

services:
  app:
    build: .
    container_name: gestion_events_app
    ports:
      - "8000:80"
    environment:
      APP_ENV: production
      APP_DEBUG: 'false'
      APP_KEY: ''
      DB_CONNECTION: sqlite
      DB_DATABASE: /app/storage/database.sqlite
      SANCTUM_STATEFUL_DOMAINS: localhost,127.0.0.1
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/bootstrap/cache:/app/bootstrap/cache
    restart: unless-stopped

  # Optional: MySQL for development
  mysql:
    image: mysql:8.0
    container_name: gestion_events_mysql
    environment:
      MYSQL_DATABASE: gestion_evenements
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PORT: 3306
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    # Uncomment to use MySQL instead of SQLite

volumes:
  mysql_data:
